meters:
- name: developer_seats
  description: Number of licensed developer seats on the Cortex platform - the primary billing metric.
  unit: seats
  aggregation: max
  dimensions:
  - account
  - team
- name: api_requests
  description: REST API requests. Included with the subscription (governed by rate limits), not separately metered.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - apiKey
principles:
- name: Visibility
  description: Track licensed developer seats against active users; monitor which teams actually use the catalog and Scorecards.
- name: Allocation
  description: Map seats and catalog entities to teams so the per-developer license cost maps to internal cost centers.
- name: Optimization
  description: Reclaim inactive seats, right-size the feature tier, and use Marketplace private offers where they lower committed spend.
- name: Accountability
  description: Assign an owner for the Cortex contract; review seat count and tier against renewal terms each cycle.
