description: >-
  FinOps view of Cortex spend. Cortex is a per-developer (seat-based) SaaS internal
  developer portal, contracted as an annual/enterprise agreement (also available as
  AWS and Microsoft Marketplace private offers). Cost is driven by the number of
  developer seats rather than by the number of catalogued entities or API calls -
  the REST API is included and carries no metered usage fee beyond the documented
  rate limits. Because pricing is contact-sales, per-unit rates are not reconciled
  here.
notes: >-
  reconciled=false. Cortex does not publish per-seat rates; model spend from your
  negotiated per-developer price times seat count. The dominant cost lever is seat
  count and enterprise feature tier, not API consumption.
