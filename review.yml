aid: cortex-idp
name: Cortex
review:
  question: Does Cortex expose a documented public WebSocket API?
  answer: false
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Cortex's documented public API
    (https://api.getcortexapp.com/api/v1) is request/response REST over HTTPS.
    Cortex is an internal developer portal / software catalog; the platform
    ingests data by polling and by receiving inbound webhooks from integrations
    (GitHub, PagerDuty, Datadog, etc.) and via custom-integration webhook
    endpoints (POST /custom-integrations/data/{uuid}) - inbound HTTP, not a
    server-push transport Cortex exposes to consumers. There is no documented
    WebSocket (ws:// / wss://) or SSE stream on Cortex's own API to model.
findings:
  summary: |
    Cortex does not publish a documented public WebSocket API. Cortex (cortex.io)
    is an internal developer portal (IDP) and software catalog with Scorecards.
    Its public API is a REST API at https://api.getcortexapp.com/api/v1,
    authenticated with an Authorization Bearer token (an API key created in the
    workspace Settings page; HTTP bearer, JWT-format). Every documented operation
    - Catalog/Entities, Scorecards, Custom Data, Initiatives, Deploys, Teams,
    Audit logs, and per-integration configuration - is request/response REST over
    HTTPS. No realtime, bidirectional, or streaming WebSocket endpoint is
    documented on Cortex's own API as of the review date.
  disambiguation: |
    This review covers Cortex.io the internal developer portal / service catalog
    & scorecards company (docs.cortex.io, api.getcortexapp.com). It is NOT Cortex
    XSOAR / Cortex XDR by Palo Alto Networks, NOT the Cortex (CTXC) crypto token,
    and NOT Orange Logic's Cortex digital asset management (DAM) product.
  accessModel: |
    Cortex is a commercial SaaS internal developer portal (also offered via AWS
    Marketplace and Microsoft/Azure Marketplace). The REST API is available to
    authenticated workspace customers using an API key. There is no open,
    unauthenticated public data API; the API operates on your own workspace's
    catalog. The API reference is public at docs.cortex.io/api.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.getcortexapp.com/api/v1
      documented: true
      note: Full public REST API - Catalog, Scorecards, Custom Data, Initiatives, Deploys, Teams, Integrations. Bearer auth.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Inbound webhooks hydrate the catalog (integrations and POST /custom-integrations/data/{uuid}). Inbound HTTP to Cortex, not a consumer-facing push stream.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the Cortex API reference as of the review date.
