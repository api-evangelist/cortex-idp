sources:
  - url: https://docs.cortex.io/api
    type: Documentation
    note: REST API overview - Bearer auth, 1000 req/min per client, 2MB body cap, 429 with Retry-After. No WebSocket mentioned.
  - url: https://docs.cortex.io/api/readme/catalog-entities
    type: APIReference
    note: Catalog entity CRUD, upsert via /open-api, archive/unarchive, descriptors.
  - url: https://docs.cortex.io/api/readme/scorecards
    type: APIReference
    note: Scorecards, scores, next-steps, badges, exemptions.
  - url: https://docs.cortex.io/api/readme/custom-data
    type: APIReference
    note: Custom key/value data on entities, including bulk and advanced retrieval.
  - url: https://docs.cortex.io/api/readme/initiatives
    type: APIReference
    note: Initiative CRUD keyed by 18-char cid.
  - url: https://docs.cortex.io/api/readme/deploys
    type: APIReference
    note: Deploy events per entity, environments, and search.
  - url: https://docs.cortex.io/api/readme/integrations/github
    type: APIReference
    note: GitHub integration configuration CRUD - exemplar for ~30 integrations.
  - url: https://www.cortex.io/pricing
    type: Pricing
    note: Official pricing page is contact-sales / custom proposal; no public rate card.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Cortex's documented public API is
    request/response REST (api.getcortexapp.com/api/v1) with Bearer/API-key auth.
    Data ingestion happens through polling and inbound webhooks, not a
    consumer-facing server-push transport, so no AsyncAPI document was created.
