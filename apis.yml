  description: The software catalog core - list, retrieve, create/update (upsert via
    entity descriptor), archive, unarchive, and delete catalog entities (services,
    resources, domains, and custom entity types). Retrieve an entity's descriptor,
    GitOps logs, and its scorecard scores. This is the service-catalog / internal
    developer portal surface consumers search for when they look for a software
    catalog.
