aid: cortex-idp
url: https://raw.githubusercontent.com/api-evangelist/cortex-idp/refs/heads/main/apis.yml
name: Cortex
kind: company
description: Cortex (cortex.io) is an internal developer portal (IDP) and software
  catalog platform. It gives engineering organizations a catalog of services and
  entities, Scorecards that measure those entities against production-readiness and
  reliability standards, Initiatives for driving improvement campaigns, and roughly
  thirty integrations (GitHub, PagerDuty, Datadog, Kubernetes, and more) that
  hydrate the catalog. Cortex exposes a documented REST API (base
  https://api.getcortexapp.com/api/v1) with Bearer/API-key authentication covering
  the Catalog/Entities, Scorecards, Custom Data, Initiatives, Deploys, Teams, and
  Integrations. NOTE - this is Cortex.io the internal developer portal / service
  catalog & scorecards company, NOT Cortex XSOAR (Palo Alto Networks), NOT the
  Cortex crypto token, and NOT Orange Logic's Cortex DAM.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Software Catalog
- Internal Developer Portal
- Service Catalog
- Developer Experience
- IDP
- Scorecards
- Platform Engineering
- Developer Portal
created: '2026-07-11'
modified: '2026-07-11'
